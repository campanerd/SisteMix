info:
  name: List Installments with Filters
  type: http
  seq: 17

http:
  method: GET
  url: http://localhost:8080/api/installments?status={{status}}&dueDateFrom={{dateFrom}}&dueDateTo={{dateTo}}
  params:
    - name: status
      value: "{{status}}"
      type: query
    - name: dueDateFrom
      value: "{{dateFrom}}"
      type: query
    - name: dueDateTo
      value: "{{dateTo}}"
      type: query
  auth:
    type: bearer
    token: {{token}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
