info:
  name: Update Installment Status
  type: http
  seq: 20

http:
  method: PATCH
  url: http://localhost:8080/api/installments/{{IdInstallment}}/status
  body:
    type: json
    data: |-
      {
        "status": "PAID"
      }
  auth:
    type: bearer
    token: {{token}}

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
